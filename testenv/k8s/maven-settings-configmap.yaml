---
# maven-settings-configmap.yaml
# Mounts /root/.m2/settings.xml into build pods so Maven routes all
# dependency lookups through the local Artifactory instance.
# Applied by create.sh; mirrors testenv/jenkins/maven-settings.xml.
apiVersion: v1
kind: ConfigMap
metadata:
  name: maven-settings
  namespace: jenkins-builds
data:
  settings.xml: |
    <?xml version="1.0" encoding="UTF-8"?>
    <settings xmlns="http://maven.apache.org/SETTINGS/1.2.0"
              xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"
              xsi:schemaLocation="http://maven.apache.org/SETTINGS/1.2.0
                                  https://maven.apache.org/xsd/settings-1.2.0.xsd">
      <!-- Route all Maven traffic through Artifactory. Overrides the built-in
           maven-default-http-blocker (Maven 3.8+) for the internal HTTP endpoint. -->
      <mirrors>
        <mirror>
          <id>maven-public</id>
          <mirrorOf>*</mirrorOf>
          <url>http://host.k3d.internal:8082/artifactory/maven-public/</url>
        </mirror>
      </mirrors>

      <servers>
        <server>
          <id>maven-public</id>
          <username>admin</username>
          <password>${env.ARTIFACTORY_PASSWORD}</password>
        </server>
        <server>
          <id>maven-internal</id>
          <username>admin</username>
          <password>${env.ARTIFACTORY_PASSWORD}</password>
        </server>
      </servers>
    </settings>
