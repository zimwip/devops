# helm/values.yaml — default values, overridden per environment

replicaCount: 1

image:
  repository: registry.internal/{{SERVICE_NAME}}
  tag: "0.1.0"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8080

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi

probes:
  liveness:
    path: /health
    initialDelaySeconds: 15
    periodSeconds: 10
  readiness:
    path: /health
    initialDelaySeconds: 10
    periodSeconds: 5

# Environment variables injected at runtime
env:
  APP_ENV: "default"
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4317"
