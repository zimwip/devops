# docker-compose.yml — AP3 local test environment
#
# No static IPs — services talk to each other by service name (Docker DNS).
# k3d build pods reach Jenkins via host.k3d.internal (injected by k3d into
# every pod's /etc/hosts), so no shared network with k3d is needed.
#
# Start order (managed by create.sh):
#   Phase 1 — dc up -d postgres sonarqube registry gitea artifactory
#   Phase 2 — dc up -d jenkins   (after SonarQube token + Artifactory config + k3d SA token)

services:

  # ── PostgreSQL — SonarQube backend ──────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: sonarqube
      POSTGRES_USER: sonarqube
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sonarqube"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── SonarQube Community ──────────────────────────────────────────────────────
  sonarqube:
    image: sonarqube:10-community
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SONAR_JDBC_URL: "jdbc:postgresql://postgres:5432/sonarqube"
      SONAR_JDBC_USERNAME: sonarqube
      SONAR_JDBC_PASSWORD: "${POSTGRES_PASSWORD}"
      SONAR_ES_BOOTSTRAP_CHECKS_DISABLE: "true"
    ports:
      - "9000:9000"
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_extensions:/opt/sonarqube/extensions
      - sonarqube_logs:/opt/sonarqube/logs
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9000/api/system/status | grep -q '\"status\":\"UP\"'"]
      interval: 20s
      timeout: 10s
      retries: 20
      start_period: 90s
    restart: unless-stopped
    ulimits:
      nofile:
        soft: 65536
        hard: 65536

  # ── Local container registry ──────────────────────────────────────────────────
  registry:
    image: registry:2
    ports:
      - "5000:5000"
    volumes:
      - registry_data:/var/lib/registry
    restart: unless-stopped

  # ── JFrog Artifactory OSS — Maven artifact repository ────────────────────────
  # Hosts internal com.myorg:* artifacts and proxies Maven Central so build
  # pods resolve all dependencies through a single internal endpoint.
  # Web UI: http://localhost:8082  (admin / see .users)
  #
  # Pinned to 7.41.13 — last OSS release with free repository REST APIs.
  # Newer OSS versions (7.49+) restrict PUT /api/repositories to Pro only,
  # and drop the default admin/password in favour of a 15-min bootstrap token.
  # 7.41.13 uses Derby (embedded), so no separate postgres DB is needed.
  artifactory:
    image: releases-docker.jfrog.io/jfrog/artifactory-oss:7.41.13
    ports:
      - "8082:8082"
    volumes:
      - artifactory_data:/var/opt/jfrog/artifactory
    environment:
      ARTIFACTORY_HOME: /var/opt/jfrog/artifactory
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8082/artifactory/api/system/ping | grep -q OK"]
      interval: 20s
      timeout: 10s
      retries: 30
      start_period: 120s
    restart: unless-stopped

  # ── Gitea — local GitHub replacement ─────────────────────────────────────────
  # GitHub-compatible REST API (v1) — platform CLI uses it like GitHub:
  #   create repos, push CODEOWNERS, set branch protection.
  gitea:
    image: gitea/gitea:1.22
    container_name: gitea
    environment:
      GITEA__database__DB_TYPE: sqlite3
      GITEA__server__ROOT_URL: "http://localhost:3000/"
      GITEA__server__HTTP_PORT: "3000"
      GITEA__security__INSTALL_LOCK: "true"
      GITEA__log__LEVEL: warn
      # Registration stays open so create.sh can register the first admin via
      # the web form (first user = auto-admin). The script disables it afterward.
    ports:
      - "3000:3000"
      - "2222:22"
    volumes:
      - gitea_data:/data
    # Join the k3d network so agent pods can reach Gitea via a headless
    # Service+Endpoints registered by create.sh / start.sh.  The k3d-ap3
    # network is created by k3d before docker compose up is called.
    networks:
      - default
      - k3d-ap3
    restart: unless-stopped

  # ── Jenkins LTS ──────────────────────────────────────────────────────────────
  # Built from ./jenkins/Dockerfile — plugins pre-baked at image build time.
  # JCasC config mounted from ./jenkins/casc/jenkins.yaml (SELinux :z for Fedora).
  jenkins:
    build:
      context: ./jenkins
      dockerfile: Dockerfile
    image: ap3-jenkins:local
    depends_on:
      - sonarqube
      - registry
      - gitea
      - artifactory
    # Make the host machine reachable from inside the Jenkins container.
    # This is required so the Kubernetes plugin can reach the k3d API at
    # host.containers.internal:6550 (K8S_API_URL).
    extra_hosts:
      - "host.containers.internal:host-gateway"
      - "host.docker.internal:host-gateway"
      # k3d injects host.k3d.internal into pod /etc/hosts → host machine.
      # Add it here too so the Jenkins controller uses the same hostname as pods.
      - "host.k3d.internal:host-gateway"
    environment:
      JENKINS_ADMIN_USER: "${JENKINS_ADMIN_USER}"
      JENKINS_ADMIN_PASSWORD: "${JENKINS_ADMIN_PASSWORD}"
      SONARQUBE_URL: "http://sonarqube:9000"
      SONARQUBE_TOKEN: "${SONARQUBE_TOKEN}"
      K8S_API_URL: "${K8S_API_URL}"
      K8S_SA_TOKEN: "${K8S_SA_TOKEN}"
      GITHUB_TOKEN: "${GITHUB_TOKEN:-placeholder-set-in-env}"
      # Artifactory password injected into build pods via artifactory-credentials Secret.
      ARTIFACTORY_PASSWORD: "${ARTIFACTORY_PASSWORD:-}"
      # Docker-internal hostname — used by JCasC (giteaServers, globalLibraries).
      # Must NOT be localhost:3000 (that resolves to Jenkins itself inside the container).
      # k3d pods resolve 'gitea' via a headless Service+Endpoints in jenkins-builds
      # created by create.sh / refreshed by start.sh (Gitea is connected to k3d-ap3
      # and its IP is registered in the Endpoints object so kube-dns resolves it).
      GITEA_URL: "http://gitea:3000"
      GITEA_ORG: "${GITEA_ORG:-ap3}"
      SHARED_LIB_REPO_NAME: "${SHARED_LIB_REPO_NAME:-jenkins-shared-lib}"
    ports:
      - "8080:8080"
      - "50000:50000"
    volumes:
      - jenkins_data:/var/jenkins_home
      - ./jenkins/casc:/var/jenkins_home/casc_configs:ro,z
    # Join the k3d Podman network so Jenkins can reach the k3d API server
    # directly at k3d-ap3-serverlb:6443, avoiding host port-forwarding.
    # The k3d-ap3 network is created by k3d before Jenkins starts.
    networks:
      - default
      - k3d-ap3
    restart: unless-stopped

networks:
  k3d-ap3:
    external: true
    name: k3d-ap3

volumes:
  postgres_data:
  sonarqube_data:
  sonarqube_extensions:
  sonarqube_logs:
  registry_data:
  gitea_data:
  artifactory_data:
  jenkins_data:
