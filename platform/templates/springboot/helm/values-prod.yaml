# helm/values-prod.yaml — PRODUCTION environment overrides
replicaCount: 3

env:
  SPRING_PROFILES_ACTIVE: "prod"
  LOG_LEVEL: "WARN"

resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: 2000m
    memory: 1Gi

# Enable HPA in prod
autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
