spring.application.name={{SERVICE_NAME}}

# Version info injected via Docker build args → env vars → Spring Boot actuator
# /actuator/info exposes these to dashboards and health checks
info.app.name={{SERVICE_NAME}}
info.app.version=${APP_VERSION:0.1.0}
info.app.description={{DESCRIPTION}}
info.git.commit=${GIT_COMMIT:local}
info.build.date=${BUILD_DATE:unknown}

# Expose health and info endpoints
management.endpoints.web.exposure.include=health,info
management.info.env.enabled=true
