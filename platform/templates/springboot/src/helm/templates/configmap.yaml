apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "chart.fullname" . }}-config
  labels:
    {{- include "chart.labels" . | nindent 4 }}
data:
  # Non-sensitive runtime configuration.
  # Secrets come from Vault — never put them here.
  APP_NAME: {{ include "chart.fullname" . | quote }}
  APP_VERSION: {{ .Chart.AppVersion | quote }}
  ENV: {{ .Values.env.SPRING_PROFILES_ACTIVE | default "default" | quote }}
